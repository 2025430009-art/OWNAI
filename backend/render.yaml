services:
  - type: web
    name: ownai-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node --max-old-space-size=512 src/server.js
    autoDeploy: true
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_QVAC
        value: "false"
      - key: ENABLE_REASONING
        value: "false"
      - key: PORT
        value: 10000
      - key: ALLOW_PUBLIC_INFERENCE
        value: "true"
      - key: CORS_ORIGIN
        value: "https://2025430009-art.github.io"
      - key: ANTHROPIC_API_KEY
        sync: false
