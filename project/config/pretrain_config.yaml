seed: 42
output_dir: outputs/pretrain
tokenizer_path: outputs/pretrain/tokenizer.json
resume_from_checkpoint: null
run_name_prefix: gpt12l-pt
wandb_project: gpt12l-pretrain
logging_dir: outputs/pretrain/logs
model:
  vocab_size: 40000
  n_layers: 12
  n_heads: 12
  d_model: 768
  d_ff: 3072
  dropout: 0.1
  max_seq_len: 512
training:
  objective: causal_lm
  epochs: 100
  batch_size: 64
  learning_rate: 2.5e-4
  warmup_steps: 2000
  lr_schedule: cosine_decay
  weight_decay: 0.01
  log_with: tensorboard
  fp16: false
  bf16: false
data:
  dataset_name: bookcorpus
  text_column: text
  context_window: 512
  tokenizer_sample_size: 200000
